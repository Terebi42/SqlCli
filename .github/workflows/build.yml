name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.x

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x

    - name: Restore
      run: dotnet restore SqlCli.slnx

    - name: Build
      run: dotnet build SqlCli.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test SqlCli.slnx --no-build --configuration Release --verbosity normal
